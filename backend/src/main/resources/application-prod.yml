spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/curtaincall?serverTimezone=Asia/Seoul&characterEncoding=UTF-8}
    username: ${SPRING_DATASOURCE_USERNAME:curtaincall}
    password: ${SPRING_DATASOURCE_PASSWORD:curtaincall123}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  batch:
    jdbc:
      initialize-schema: ${SPRING_BATCH_JDBC_INITIALIZE_SCHEMA:never}

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.curtaincall: ${APP_LOG_LEVEL:INFO}
    org.hibernate.SQL: WARN
