spring:
  profiles:
    default: local

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 50MB

  batch:
    job:
      enabled: false

  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID:your-kakao-client-id}
            client-secret: ${KAKAO_CLIENT_SECRET:your-kakao-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            client-authentication-method: client_secret_post
            scope:
              - profile_nickname
              - account_email
          naver:
            client-id: ${NAVER_CLIENT_ID:your-naver-client-id}
            client-secret: ${NAVER_CLIENT_SECRET:your-naver-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
              - profile_image
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            scope:
              - email
              - profile
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

jwt:
  secret: ${JWT_SECRET}
  access-expiration: 3600000
  refresh-expiration: 604800000

kopis:
  api-key: ${KOPIS_API_KEY}
  base-url: http://www.kopis.or.kr/openApi/restful

storage:
  do-spaces:
    endpoint: ${DO_SPACES_ENDPOINT:https://sgp1.digitaloceanspaces.com}
    region: ${DO_SPACES_REGION:sgp1}
    access-key: ${DO_SPACES_ACCESS_KEY:}
    secret-key: ${DO_SPACES_SECRET_KEY:}
    bucket: ${DO_SPACES_BUCKET:curtaincall}
    cdn-url: ${DO_SPACES_CDN_URL:https://curtaincall.sgp1.cdn.digitaloceanspaces.com}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
  default-consumes-media-type: application/json
  default-produces-media-type: application/json

server:
  forward-headers-strategy: native
