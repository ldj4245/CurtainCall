spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/curtaincall?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&createDatabaseIfNotExist=true&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  batch:
    jdbc:
      initialize-schema: always

app:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}

logging:
  level:
    com.curtaincall: DEBUG
    org.hibernate.SQL: WARN
