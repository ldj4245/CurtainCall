version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: curtaincall-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: curtaincall
      MYSQL_USER: curtaincall
      MYSQL_PASSWORD: curtaincall123
      MYSQL_ROOT_HOST: '%'
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - ./mysql/conf.d:/etc/mysql/conf.d
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: curtaincall-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/curtaincall?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
      SPRING_DATASOURCE_USERNAME: curtaincall
      SPRING_DATASOURCE_PASSWORD: curtaincall123
      KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      NAVER_CLIENT_ID: ${NAVER_CLIENT_ID}
      NAVER_CLIENT_SECRET: ${NAVER_CLIENT_SECRET}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      KOPIS_API_KEY: ${KOPIS_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://sgp1.digitaloceanspaces.com}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-sgp1}
      DO_SPACES_ACCESS_KEY: ${DO_SPACES_ACCESS_KEY:-}
      DO_SPACES_SECRET_KEY: ${DO_SPACES_SECRET_KEY:-}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-curtaincall}
      DO_SPACES_CDN_URL: ${DO_SPACES_CDN_URL:-https://curtaincall.sgp1.cdn.digitaloceanspaces.com}
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: curtaincall-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - backend

volumes:
  mysql_data:
