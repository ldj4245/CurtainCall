server {
    listen 80;
    server_name thecurtaincall.me www.thecurtaincall.me;

    # HTTP -> HTTPS 리다이렉트
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name thecurtaincall.me www.thecurtaincall.me;

    ssl_certificate /etc/letsencrypt/live/thecurtaincall.me/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/thecurtaincall.me/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 20m;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 300s;
    }

    location /oauth2/authorization/ {
        proxy_pass http://backend:8080/oauth2/authorization/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /oauth2/callback {
        try_files $uri /index.html;
    }

    location /login/oauth2/ {
        proxy_pass http://backend:8080/login/oauth2/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /login {
        try_files $uri /index.html;
    }

    gzip on;
    gzip_types text/plain application/javascript text/css application/json;
}
