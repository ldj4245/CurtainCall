name: CI/CD Pipeline

on:
  push:
    branches: [ master ]

concurrency:
  group: production-master
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: curtaincall_test
          MYSQL_USER: curtaincall
          MYSQL_PASSWORD: curtaincall123
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*') }}

      - name: Grant execute permission for gradlew
        run: chmod +x backend/gradlew

      - name: Build and Test
        run: ./gradlew build
        working-directory: backend
        env:
          JWT_SECRET: test-secret-key-for-ci-must-be-long-enough-for-hs256
          KOPIS_API_KEY: test-key

      - name: Prepare backend artifact
        run: |
          JAR_PATH=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*plain.jar' | head -n 1)
          cp "$JAR_PATH" build/libs/app.jar
        working-directory: backend

      - name: Upload backend jar
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs/app.jar
          if-no-files-found: error

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist
          if-no-files-found: error

  backend-image:
    name: Backend Docker Image
    runs-on: ubuntu-latest
    needs: backend-test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download backend jar
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: backend/build/libs

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/curtaincall-backend:latest
            ghcr.io/${{ github.repository_owner }}/curtaincall-backend:${{ github.sha }}
          cache-from: type=gha,scope=backend-image
          cache-to: type=gha,mode=max,scope=backend-image

  frontend-image:
    name: Frontend Docker Image
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile.runtime
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/curtaincall-frontend:latest
            ghcr.io/${{ github.repository_owner }}/curtaincall-frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend-image
          cache-to: type=gha,mode=max,scope=frontend-image

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [ backend-image, frontend-image ]
    if: github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to DigitalOcean
        env:
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          FALLBACK_GHCR_USERNAME: ${{ github.actor }}
          FALLBACK_GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GHCR_NAMESPACE: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          REGISTRY_USER="${GHCR_USERNAME:-$FALLBACK_GHCR_USERNAME}"
          REGISTRY_TOKEN="${GHCR_TOKEN:-$FALLBACK_GHCR_TOKEN}"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key $SERVER_USER@$SERVER_HOST "
            set -e
            cd ~/curtaincall
            git pull origin master
            echo '$REGISTRY_TOKEN' | docker login ghcr.io -u '$REGISTRY_USER' --password-stdin
            export GHCR_NAMESPACE='$GHCR_NAMESPACE'
            export IMAGE_TAG='$IMAGE_TAG'
            docker compose -f docker-compose.server.yml pull backend frontend
            docker compose -f docker-compose.server.yml up -d --remove-orphans mysql backend frontend
            docker image prune -f
            echo 'Deploy completed at' \$(date)
          "
